<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>OTC AI • Terms of Service</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#09090b,#111827,#0f172a);

color:white;

min-height:100vh;

}

header{

padding:70px 20px;

text-align:center;

}

h1{

font-size:55px;

margin-bottom:15px;

}

p{

color:#cbd5e1;

}

.lang{

display:flex;

justify-content:center;

gap:15px;

margin-top:25px;

}

background:#1f2937;

color:white;

border:none;

padding:12px 24px;

border-radius:15px;

transition:.25s;

}

.lang button:hover{

background:#2563eb;

}

.card{

}

footer{

padding:40px;

color:#94a3b8;

}

</head>

<body>

<header>

<h1>OTC AI</h1>

<div class="lang">

<button onclick="setLang('fr')">🇫🇷 Français</button>

</header>

<div class="card" id="content">

</div>

<footer>

© 2026 OTC AI

</footer>

<script>

const pages={

en:`

ru:`

<p>Используя OTC AI, вы соглашаетесь с настоящими условиями использования.</p>

document.getElementById("content").innerHTML=pages[lang]||pages.en;

setLang("en");

</body>

</html>
